<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un compte · Golden Atlas Errachidia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dark: #8a6a20;
            --dark: #050505;
            --glass: rgba(12, 11, 10, 0.82);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
        }

        #world { position: fixed; inset: 0; z-index: 0; }

        .login-wrapper { position: relative; z-index: 10; width: 100%; max-width: 500px; }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(201, 168, 76, 0.2);
            padding: 50px;
            box-shadow: 0 60px 120px rgba(0,0,0,0.9);
            animation: fadeIn 1.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .back-link {
            display: inline-flex; align-items: center; gap: 10px;
            color: rgba(201,168,76,0.7); text-decoration: none;
            font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 35px; transition: 0.4s; padding: 8px 14px; background: rgba(201,168,76,0.05);
        }
        .back-link:hover { color: var(--gold); transform: translateX(-5px); }

        .login-logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold); letter-spacing: 4px; text-align: center; display: block; }
        .login-subtitle { text-align: center; font-size: 0.62rem; letter-spacing: 6px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-top: 10px; margin-bottom: 25px; }

        .login-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 400; text-align: center; margin-bottom: 35px; color: #fff; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.62rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
        .form-group input {
            width: 100%; height: 50px; background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.2);
            padding: 0 20px; color: #fff; font-family: inherit; font-size: 0.85rem; outline: none; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--gold); background: rgba(255,255,255,0.08); }

        .btn-submit {
            width: 100%; height: 60px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            background-size: 200% 200%; border: none; color: #000;
            font-size: 0.75rem; font-weight: 800; letter-spacing: 5px; text-transform: uppercase;
            cursor: pointer; transition: 0.4s; animation: gradShift 5s ease infinite;
        }
        @keyframes gradShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

        .register-footer { text-align: center; margin-top: 30px; font-size: 0.75rem; color: rgba(255,255,255,0.3); }
        .register-footer a { color: var(--gold); text-decoration: none; font-weight: 600; margin-left: 8px; }

        .toast {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--gold); color: #000; padding: 15px 35px; font-weight: 700; opacity: 0; transition: 0.5s; z-index: 1000;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-init.js"></script>
</head>
<body>

<div id="world"></div>
<div id="toast" class="toast"></div>

<div class="login-wrapper">
    <div class="login-card">
        <a href="index.html" class="back-link">
            ← RETOUR · BACK
        </a>

        <div class="login-header">
            <span class="login-logo">GOLDEN ATLAS</span>
            <p class="login-subtitle">Errachidia · Palace</p>
            <h1>Rejoindre l'excellence</h1>
        </div>

        <form id="register-form">
            <div class="form-group">
                <label>Nom Complet</label>
                <input type="text" placeholder="Votre nom" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="votre@email.com" required>
            </div>
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" placeholder="Username" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">CRÉER MON COMPTE</button>
        </form>

        <div class="register-footer">
            Déjà inscrit ? <a href="login.html">Se connecter →</a>
        </div>
    </div>
</div>

<script>
/* ── High-Quality 3D Engine ── */
(function() {
    const world = document.getElementById('world');
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x050505, 100, 950);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
    camera.position.set(0, 50, 200);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    world.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    scene.add(new THREE.HemisphereLight(0xaaaaaa, 0x000000, 0.9));
    const shadowLight = new THREE.DirectionalLight(0xffffff, 0.9);
    shadowLight.position.set(150, 350, 350); scene.add(shadowLight);

    const seaGeo = new THREE.CylinderGeometry(600, 600, 800, 40, 10);
    seaGeo.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI/2));
    const sea = new THREE.Mesh(seaGeo, new THREE.MeshPhongMaterial({ color: 0xc9a84c, transparent: true, opacity: 0.15, flatShading: true }));
    sea.position.y = -600; scene.add(sea);

    const Airplane = function() {
        this.mesh = new THREE.Group();
        const matBody = new THREE.MeshPhongMaterial({ color: 0xc9a84c, flatShading: true });
        const cockpit = new THREE.Mesh(new THREE.BoxGeometry(60, 50, 50), matBody);
        this.mesh.add(cockpit);
        const engine = new THREE.Mesh(new THREE.BoxGeometry(20, 50, 50), new THREE.MeshPhongMaterial({ color: 0xffffff, flatShading: true }));
        engine.position.x = 40; this.mesh.add(engine);
        const tail = new THREE.Mesh(new THREE.BoxGeometry(15, 20, 5), matBody);
        tail.position.set(-35, 25, 0); this.mesh.add(tail);
        const wing = new THREE.Mesh(new THREE.BoxGeometry(40, 8, 150), matBody);
        this.mesh.add(wing);
        this.propeller = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 10), new THREE.MeshPhongMaterial({ color: 0x111, flatShading: true }));
        this.propeller.position.set(50, 0, 0);
        const blade = new THREE.Mesh(new THREE.BoxGeometry(1, 100, 20), new THREE.MeshPhongMaterial({ color: 0x111, flatShading: true }));
        blade.position.set(8, 0, 0); this.propeller.add(blade);
        this.mesh.add(this.propeller);
    };

    const airplane = new Airplane();
    airplane.mesh.scale.set(0.35, 0.35, 0.35);
    airplane.mesh.position.y = 80; scene.add(airplane.mesh);

    const Cloud = function() {
        this.mesh = new THREE.Group();
        const geom = new THREE.BoxGeometry(20, 20, 20);
        const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
        for (let i=0; i<4; i++) {
            const m = new THREE.Mesh(geom, mat);
            m.position.set(i*15, Math.random()*10, Math.random()*10);
            const s = 0.1 + Math.random() * 0.9; m.scale.set(s,s,s);
            this.mesh.add(m);
        }
    };
    const cloudsGroup = new THREE.Group();
    for (let i=0; i<15; i++) {
        const c = new Cloud();
        c.mesh.position.set((Math.random()-0.5)*1000, 100 + Math.random()*200, (Math.random()-0.5)*500);
        cloudsGroup.add(c.mesh);
    }
    scene.add(cloudsGroup);

    let clock = 0;
    function animate() {
        requestAnimationFrame(animate);
        clock += 0.01;
        sea.rotation.z += 0.005;
        airplane.propeller.rotation.x += 0.4;
        airplane.mesh.position.y = 80 + Math.sin(clock * 2) * 10;
        airplane.mesh.rotation.z = Math.cos(clock) * 0.1;
        cloudsGroup.children.forEach(c => {
            c.position.x -= 2;
            if (c.position.x < -800) c.position.x = 800;
        });
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    });
})();

document.getElementById('register-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.querySelector('.btn-submit');
    const toast = document.getElementById('toast');
    btn.textContent = 'CHARGEMENT...';
    setTimeout(() => {
        toast.textContent = '✓ COMPTE CRÉÉ AVEC SUCCÈS';
        toast.classList.add('show');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    }, 1500);
});
</script>

</body>
</html>
