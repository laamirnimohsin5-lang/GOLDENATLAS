<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Réservations · Golden Atlas Errachidia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-init.js"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dark: #8a6a20;
            --dark: #050505;
            --glass: rgba(12, 11, 10, 0.82);
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
        }
        #world { position: fixed; inset: 0; z-index: 0; }
        .login-wrapper { position: relative; z-index: 10; width: 100%; max-width: 760px; }
        .login-card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(201, 168, 76, 0.2);
            padding: 50px;
            box-shadow: 0 60px 120px rgba(0,0,0,0.9);
            animation: fadeIn 1.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .back-link {
            display: inline-flex; align-items: center; gap: 10px;
            color: rgba(201,168,76,0.7); text-decoration: none;
            font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase;
            margin-bottom: 35px; transition: 0.4s; padding: 8px 14px; background: rgba(201,168,76,0.05);
        }
        .back-link:hover { color: var(--gold); transform: translateX(-5px); }
        .login-logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold); letter-spacing: 4px; text-align: center; display: block; }
        .login-subtitle { text-align: center; font-size: 0.62rem; letter-spacing: 6px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-top: 10px; margin-bottom: 25px; }

        .account-header {
            display: flex; align-items: center; gap: 20px;
            background: rgba(201,168,76,0.05);
            border: 1px solid rgba(201,168,76,0.15);
            padding: 25px; margin-bottom: 30px;
        }
        .account-avatar {
            width: 65px; height: 65px; border-radius: 50%;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #000;
            flex-shrink: 0;
        }
        .account-meta h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #fff; letter-spacing: 2px; }
        .account-meta p { font-size: 0.65rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-top: 5px; }

        .section-title {
            font-size: 0.62rem; letter-spacing: 5px; text-transform: uppercase;
            color: var(--gold); margin-bottom: 18px; display: flex;
            align-items: center; gap: 12px;
        }
        .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.2); }

        .reservation-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(201,168,76,0.15);
            padding: 22px 25px; margin-bottom: 14px;
            transition: 0.3s;
        }
        .res-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
        .res-room { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; color: #fff; }
        .res-status { font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase; padding: 5px 12px; border-radius: 30px; font-weight: 700; }
        .res-status.Validée { background: rgba(34,197,94,0.15); color: #22c55e; }
        .res-pending { background: rgba(251,146,60,0.15); color: #fb923c; }

        .res-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
        .res-detail-item label { display: block; font-size: 0.55rem; letter-spacing: 2px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 4px; }
        .res-detail-item span { font-size: 0.85rem; color: #e8c97a; font-weight: 600; }

        .notification-banner {
            background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(34,197,94,0.06));
            border: 1px solid rgba(34,197,94,0.4);
            border-left: 4px solid #22c55e;
            padding: 20px 25px; margin-top: 15px; border-radius: 8px;
        }
        .btn-submit {
            width: 100%; height: 50px;
            background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
            border: none; color: #000; font-size: 0.7rem; font-weight: 800; letter-spacing: 3px; text-transform: uppercase;
            cursor: pointer; transition: 0.4s;
        }
        .btn-row { display: flex; gap: 12px; margin-top: 25px; }
        .empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); border: 1px dashed rgba(201,168,76,0.15); }
    </style>
</head>
<body>
    <div id="world"></div>
    <div class="login-wrapper">
        <div class="login-card">
            <a href="index.html" class="back-link">← RETOUR · BACK</a>
            <div class="login-header">
                <span class="login-logo">GOLDEN ATLAS</span>
                <p class="login-subtitle">VOS SÉJOURS D'EXCEPTION</p>
            </div>

            <div id="account-view">
                <div class="account-header">
                    <div class="account-avatar" id="acc-initials">G</div>
                    <div class="account-meta">
                        <h2 id="display-user-name">CHARGEMENT...</h2>
                        <p id="display-user-email"></p>
                        <div style="display: flex; gap: 10px; align-items: center; margin-top: 10px;">
                            <span id="loyalty-points" style="font-size: 0.65rem; background: rgba(201,168,76,0.15); color: var(--gold); padding: 5px 12px; border-radius: 30px; letter-spacing: 1px; font-weight: 700; border: 1px solid rgba(201,168,76,0.3);">⭐ 0 POINTS</span>
                        </div>
                    </div>
                </div>

                <!-- Loyalty Offer Message -->
                <div id="loyalty-offer" style="display: none; background: linear-gradient(135deg, rgba(201,168,76,0.2), rgba(201,168,76,0.05)); border: 1px solid var(--gold); padding: 15px; margin-bottom: 20px; border-radius: 8px; text-align: center; animation: pulseGold 2s infinite;">
                    <p style="color: var(--gold); font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;">🎉 FÉLICITATIONS ! VOUS AVEZ 10 POINTS.</p>
                    <p style="color: #fff; font-size: 0.85rem; margin-top: 5px;">Bénéficiez de <span style="color: var(--gold-light); font-weight: 900;">-25% DE RÉDUCTION</span> sur votre prochain séjour !</p>
                </div>
                <style>
                    @keyframes pulseGold { 0% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(201, 168, 76, 0); } 100% { box-shadow: 0 0 0 0 rgba(201, 168, 76, 0); } }
                </style>

                <p class="section-title">Mes Réservations</p>
                <div id="reservations-container">
                    <div class="empty-state">Chargement de vos données...</div>
                </div>

                <div class="btn-row">
                    <a href="index.html" class="btn-submit" style="display: flex; align-items: center; justify-content: center; text-decoration: none;">RETOUR AU SITE</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 3D Background (Simplified from login-client)
        (function() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(0, 50, 200);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('world').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            
            const sea = new THREE.Mesh(new THREE.CylinderGeometry(600, 600, 800, 40), new THREE.MeshPhongMaterial({ color: 0xc9a84c, transparent: true, opacity: 0.15 }));
            sea.rotation.x = -Math.PI / 2; sea.position.y = -600; scene.add(sea);

            function animate() {
                requestAnimationFrame(animate);
                sea.rotation.z += 0.002;
                renderer.render(scene, camera);
            }
            animate();
        })();

        // Data Logic
        window.addEventListener('load', async () => {
            const user = JSON.parse(localStorage.getItem('ga_current_user') || 'null');
            if (!user) { window.location.href = 'login-client.html'; return; }

            document.getElementById('display-user-name').textContent = user.name;
            document.getElementById('display-user-email').textContent = user.email || user.cin;
            document.getElementById('acc-initials').textContent = user.name[0];

            const { data: reservations, count } = await window.supabaseClient
                .from('ga_reservations')
                .select('*', { count: 'exact' })
                .or(`user_email.eq.${user.email},name.ilike.%${user.name.split(' ')[0]}%`)
                .order('created_at', { ascending: false });

            // Update Points Display
            const points = count || 0;
            const pointsEl = document.getElementById('loyalty-points');
            if (pointsEl) {
                pointsEl.textContent = `⭐ ${points} POINT${points > 1 ? 'S' : ''}`;
            }

            const offerEl = document.getElementById('loyalty-offer');
            if (offerEl && points >= 10) {
                offerEl.style.display = 'block';
            }

            const container = document.getElementById('reservations-container');
            if (!reservations || reservations.length === 0) {
                container.innerHTML = '<div class="empty-state">Aucune réservation trouvée.</div>';
                return;
            }

            window.localReservations = reservations;
            container.innerHTML = reservations.map(r => `
                <div class="reservation-card">
                    <div class="res-top">
                        <div class="res-room">🏨 ${r.room}</div>
                        <span class="res-status ${r.status === 'Validée' ? 'Validée' : 'res-pending'}">${r.status || 'En attente'}</span>
                    </div>
                    <div class="res-details">
                        <div class="res-detail-item"><label>Arrivée</label><span>${r.arrival}</span></div>
                        <div class="res-detail-item"><label>Départ</label><span>${r.departure}</span></div>
                        <div class="res-detail-item"><label>Réf</label><span>#GA-${r.id.slice(0,6).toUpperCase()}</span></div>
                    </div>
                    ${r.status === 'Validée' ? `
                    <div class="notification-banner">
                        <p>Votre bon de séjour est prêt.</p>
                        <button class="btn-submit" style="height:40px; margin-top:10px; font-size:0.6rem;" onclick="downloadReservationPDF('${r.id}')">TÉLÉCHARGER LE BON (PDF)</button>
                    </div>` : ''}
                </div>
            `).join('');
        });

        window.downloadReservationPDF = function(resId) {
            const res = window.localReservations?.find(r => r.id == resId);
            if (!res) return;
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Header: Elegant Black Bar & Gold Title
            doc.setFillColor(15, 15, 15);
            doc.rect(0, 0, 210, 50, 'F');
            doc.setTextColor(201, 168, 76);
            doc.setFontSize(28);
            doc.text("GOLDEN ATLAS", 105, 25, { align: 'center' });
            doc.setFontSize(10);
            doc.setTextColor(150, 110, 50);
            doc.text("P A L A C E  ·  E R R A C H I D I A", 105, 33, { align: 'center' });
            doc.text("DEPUIS 1923", 105, 38, { align: 'center' });

            // Document Title
            doc.setTextColor(40, 40, 40);
            doc.setFontSize(20);
            doc.text("BON DE SÉJOUR", 20, 70);
            doc.setDrawColor(201, 168, 76);
            doc.setLineWidth(1);
            doc.line(20, 75, 190, 75);

            // Left Column: Client & Stay Details
            doc.setFontSize(9);
            doc.setTextColor(120, 120, 120);
            doc.text("INFORMATIONS CLIENT", 20, 88);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(11);
            doc.text("Nom : " + res.name.toUpperCase(), 20, 95);
            doc.text("Email : " + (res.user_email || 'Non renseigné'), 20, 102);
            doc.text("Réf. Réservation : #GA-" + res.id.slice(0,8).toUpperCase(), 20, 109);

            // Right Column: Reference & Dates
            doc.setFontSize(9);
            doc.setTextColor(120, 120, 120);
            doc.text("DÉTAILS DU SÉJOUR", 120, 88);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(11);
            doc.text("Arrivée : " + res.arrival, 120, 95);
            doc.text("Départ : " + res.departure, 120, 102);
            doc.text("Hébergement : " + res.room.toUpperCase(), 120, 109);

            // Summary Table Style
            doc.setFillColor(248, 245, 240);
            doc.rect(20, 125, 170, 60, 'F');
            doc.setDrawColor(201, 168, 76);
            doc.rect(20, 125, 170, 60, 'S');

            doc.setFontSize(10);
            doc.setTextColor(150, 110, 50);
            doc.text("RÉSUMÉ DE LA RÉSERVATION", 30, 140);
            
            doc.setTextColor(60, 60, 60);
            doc.text("Chambre / Suite :", 30, 155);
            doc.text(res.room, 100, 155);
            
            doc.text("Nombre de Voyageurs :", 30, 165);
            doc.text((res.guests || "1") + " Adulte(s)", 100, 165);
            
            doc.text("Statut du Paiement :", 30, 175);
            doc.text("PAIEMENT À L'ARRIVÉE", 100, 175);

            // Bottom Footer with contact
            doc.setDrawColor(230, 230, 230);
            doc.line(20, 260, 190, 260);
            doc.setFontSize(8);
            doc.setTextColor(150, 150, 150);
            doc.text("Golden Atlas Errachidia - Avenue Mohammed V, Errachidia, Maroc", 105, 270, { align: 'center' });
            doc.text("Contact : +212 (0) 535-123-456 | reservation@goldenatlas.com", 105, 275, { align: 'center' });
            doc.text("Le Palais décline toute responsabilité en cas de perte de ce document.", 105, 280, { align: 'center' });

            // Gold Leaf Decoration
            doc.setDrawColor(201, 168, 76);
            doc.setLineWidth(5);
            doc.line(0, 290, 210, 290);

            doc.save("Confirmation_GoldenAtlas_" + res.name.replace(' ','_') + ".pdf");
        };
    </script>
</body>
</html>
